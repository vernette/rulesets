name: Sync unavailable-in-russia domains

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        run: python sync_unavailable_in_russia.py

      - name: Commit and push if changes
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add json/unavailable-in-russia.json
          git commit -m "chore: sync unavailable-in-russia domains" || exit 0
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger compile workflow
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run compile-srs.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
